<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Imperium Command System</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0f;
      color: gold;
    }

    header {
      padding: 20px;
      background: #111;
      text-align: center;
      font-size: 22px;
      letter-spacing: 2px;
      border-bottom: 1px solid gold;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #15151c;
      padding: 15px;
      margin: 10px 0;
      border: 1px solid #333;
      border-radius: 8px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: gold;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #ffd700;
    }

    .row {
      display: flex;
      gap: 10px;
    }
  </style>
</head>
<body>

<header>
  IMPERIUM COMMAND SYSTEM<br>
  Rank: <span id="rankDisplay">Citizen</span>
  <button onclick="showLogin()">Admin Login</button>
</header>

<div class="container">

  <div class="card">
    <h2>Create Account</h2>
    <div class="row">
      <input id="name" placeholder="Citizen Name" />
      <input id="accountPassword" type="password" placeholder="Account Password" />
      <button onclick="createAccount()">Create</button>
    </div>
  </div>

  <div class="card">
    <h2>Accounts Registry</h2>
    <div id="accounts"></div>
  </div>

  <div class="card" id="loginPanel">
    <h2>Admin Access</h2>
    <input id="adminPassword" type="password" placeholder="Enter admin password" />
    <button onclick="adminLogin()">Login</button>
  </div>

  <div class="card" id="treasuryPanel" style="display:none;">
    <h2>Imperial Treasury</h2>
    <p>Total Treasury Holdings: <span id="treasuryTotal">0</span></p>
    <p>Visible only to Senators and above.</p>
  </div>

  <div class="card" id="payrollPanel" style="display:none;">
    <h2>Imperial Payroll</h2>
    <p>Schedule weekly payments to accounts.</p>
    <input id="payrollTarget" placeholder="Account ID (CIV...)" />
    <input id="payrollAmount" type="number" placeholder="Weekly Amount" />
    <button onclick="setPayroll()">Set Weekly Payroll</button>
    <div id="payrollList"></div>
  </div>

  <div class="card" id="adminPanel" style="display:none;">
    <h2>Admin Panel</h2>
    <p>Total Accounts: <span id="totalAccounts">0</span></p>
    <button onclick="resetAccounts()">Reset All Accounts</button>
    <button onclick="grantSenator()">Grant Senator Rank</button>
    <button onclick="grantEmperor()">Grant Emperor Rank</button>
  </div>

</div>

<script>

let accounts = JSON.parse(localStorage.getItem("accounts") || "[]");
let payrolls = JSON.parse(localStorage.getItem("payrolls") || "[]");

function save() {
  localStorage.setItem("accounts", JSON.stringify(accounts));
  localStorage.setItem("payrolls", JSON.stringify(payrolls));
}

function generateId() {
  return "CIV" + Math.floor(Math.random() * 999999);
}

function createAccount() {
  const name = document.getElementById("name").value;
  if (!name) return alert("Enter a name");

  accounts.push({
    id: Date.now(),
    name,
    password: document.getElementById("accountPassword").value,
    civitas_id: generateId(),
    balance: 0
  });

  save();
  render();
}

function render() {
  document.getElementById("rankDisplay").innerText = currentRank;
  document.getElementById("totalAccounts").innerText = accounts.length;

  const totalTreasury = accounts.reduce((sum, acc) => sum + acc.balance, 0);
  document.getElementById("treasuryTotal").innerText = totalTreasury;

  if (["Senator", "Consul", "Emperor"].includes(currentRank)) {
    document.getElementById("treasuryPanel").style.display = "block";
    document.getElementById("payrollPanel").style.display = "block";
  } else {
    document.getElementById("treasuryPanel").style.display = "none";
    document.getElementById("payrollPanel").style.display = "none";
  }

  if (currentRank === "Emperor") {
    document.getElementById("adminPanel").style.display = "block";
  } else {
    document.getElementById("adminPanel").style.display = "none";
  }
  const div = document.getElementById("accounts");
  div.innerHTML = "";

  accounts.forEach(a => {
    div.innerHTML += `<div class='card'>
      <b>${a.name}</b><br>
      ID: ${a.civitas_id}<br>
      Balance: ${a.balance}<br><br>
      <input id='amount-${a.id}' type='number' placeholder='Amount' />
      <input id='pass-${a.id}' type='password' placeholder='Password' />
      <button onclick='changeBalance(${a.id}, true)'>Add</button>
      <button onclick='changeBalance(${a.id}, false)'>Remove</button>
    </div>`;
  });
}

function changeBalance(id, add) {
  const acc = accounts.find(a => a.id === id);
  if (!acc) return;

  const amount = Number(document.getElementById(`amount-${id}`).value);
  const pass = document.getElementById(`pass-${id}`).value;

  if (pass !== acc.password) {
    alert("Incorrect account password");
    return;
  }

  if (add) {
    acc.balance += amount;
  } else {
    acc.balance -= amount;
  }

  save();
  render();
}

function setPayroll() {
  const target = document.getElementById("payrollTarget").value;
  const amount = Number(document.getElementById("payrollAmount").value);

  const acc = accounts.find(a => a.civitas_id === target);
  if (!acc) return alert("Account not found");

  payrolls.push({ civitas_id: target, amount });
  save();
  renderPayrolls();
}

function renderPayrolls() {
  const div = document.getElementById("payrollList");
  if (!div) return;
  div.innerHTML = "";

  payrolls.forEach((p, i) => {
    div.innerHTML += `<div>${p.civitas_id} receives ${p.amount}/week</div>`;
  });
}

function processPayroll() {
  payrolls.forEach(p => {
    const acc = accounts.find(a => a.civitas_id === p.civitas_id);
    if (acc) acc.balance += p.amount;
  });
  save();
  render();
}

setInterval(processPayroll, 604800000);

function runTests() {
  console.log("Running tests...");

  const before = accounts.length;
  accounts.push({ id: 1, name: "Test", civitas_id: "CIV123", balance: 0 });
  save();

  console.assert(accounts.length === before + 1, "Test failed");
  console.log("Tests passed");
}

render();
renderPayrolls();
runTests();


// =====================================
// MULTIPLAYER EMPIRE SYSTEM
// =====================================

let currentRank = localStorage.getItem("rank") || "Citizen";
const ADMIN_PASSWORD = "imperium123";

function resetAccounts() {
  accounts = [];
  save();
  render();
}

function showLogin() {
  document.getElementById("loginPanel").style.display = "block";
}

function adminLogin() {
  const pass = document.getElementById("adminPassword").value;

  if (pass === ADMIN_PASSWORD) {
    currentRank = "Emperor";
    localStorage.setItem("rank", currentRank);
    render();
    alert("Admin access granted");
  } else {
    alert("Incorrect password");
  }
}

function grantSenator() {
  currentRank = "Senator";
  localStorage.setItem("rank", currentRank);
  render();
}

function grantEmperor() {
  currentRank = "Emperor";
  localStorage.setItem("rank", currentRank);
  render();
}

// Promotion removed for security. Rank changes only via admin login.

</script>

</body>
</html>
